name: Infra Validate

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-validate.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/infra-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env_dir:
          - infra/envs/dev
          - infra/envs/staging
          - infra/envs/prod
    defaults:
      run:
        working-directory: ${{ matrix.env_dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform fmt -check -recursive ../../..
      - name: Terraform init
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate
